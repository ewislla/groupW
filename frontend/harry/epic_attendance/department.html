<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Departments</title>

    <!-- IMMEDIATE AUTHENTICATION CHECK -->
    <script>
      if (!localStorage.getItem("user_token")) {
        window.location.replace("login.html");
      }
    </script>

    <!-- Standard Bootstrap 5 CSS -->
    <link href="../group_message_app/bootstrap/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #212529;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-radius: 4px;
            margin-bottom: 5px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #343a40;
            color: #ffffff;
        }

        .card {
            border: none;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <!-- Sidebar Navigation -->
        <div class="sidebar p-3" style="width: 250px;">
            <h5 class="text-white mb-4 fw-bold">Admin Portal</h5>
            <a href="faculty.html">Faculties</a>
            <a href="department.html" class="active">Departments</a>
            <a href="users.html">Users</a>
            <hr class="text-secondary">
            <a href="#" onclick="logout()" class="text-danger">Logout</a>
        </div>

        <!-- Main Content Area -->
        <div class="flex-grow-1 p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark m-0">Departments</h3>
                <button class="btn btn-primary shadow-sm" onclick="openModal('', '', '')">+ Add Department</button>
            </div>

            <div id="alertBox"></div>

            <!-- Data Table -->
            <div class="card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Department Name</th>
                                <th>Faculty ID</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">Loading data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Department Modal -->
    <div class="modal fade" id="dataModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title fw-bold" id="modalTitle">Add Department</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="dataForm">
                        <input type="hidden" id="department_id">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Select Faculty</label>
                            <select id="faculty_id" class="form-select bg-light" required>
                                <option value="">Loading faculties...</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Department Name</label>
                            <input type="text" id="name" class="form-control bg-light" required
                                placeholder="e.g. Software Engineering">
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Save Department</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="../group_message_app/bootstrap/js/bootstrap.bundle.js"></script>
    <script>
        var baseUrl = 'http://localhost:8000/api/';
        var bootstrapModal = new bootstrap.Modal(document.getElementById('dataModal'));

        // Helper to get headers
        function getHeaders(isJson) {
            var headers = {};
            // Updated to user_token
            var token = localStorage.getItem('user_token');
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            if (isJson) {
                headers['Content-Type'] = 'application/json';
            }
            return headers;
        }

        function showAlert(message, type) {
            var alertBox = document.getElementById('alertBox');
            alertBox.innerHTML = '<div class="alert alert-' + type + ' alert-dismissible shadow-sm">' + message +
                '<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>';
        }

        // UPDATED LOGOUT LOGIC: Safely releases the 1-Device-Per-User lock
        async function logout() {
          var token = localStorage.getItem("user_token");
          if (token) {
            var formData = new FormData();
            formData.append("token", token);
            try {
              await fetch(baseUrl + "LogoutUser.php", {
                method: "POST",
                body: formData
              });
            } catch (e) {
              console.error("Logout API failed, continuing local clear.");
            }
          }
          localStorage.removeItem("user_token");
          window.location.replace("login.html");
        }

        // Fetch faculties for the dropdown menu
        async function loadFaculties() {
            try {
                var response = await fetch(baseUrl + 'GetFaculty.php', { method: 'GET', headers: getHeaders(false) });
                
                if (response.status === 401) {
                    logout();
                    return;
                }

                var result = await response.json();
                var select = document.getElementById('faculty_id');

                select.innerHTML = '<option value="">Select a Faculty...</option>';

                if (result.status === 'success' && result.data) {
                    for (var i = 0; i < result.data.length; i++) {
                        var faculty = result.data[i];
                        var option = document.createElement('option');
                        option.value = faculty.faculty_id;
                        option.text = faculty.name;
                        select.appendChild(option);
                    }
                }
            } catch (error) {
                console.error('Faculty fetch error:', error);
                document.getElementById('faculty_id').innerHTML = '<option value="">Error loading faculties</option>';
            }
        }

        // Fetch departments for the table
        async function loadDepartments() {
            try {
                var response = await fetch(baseUrl + 'GetDepartment.php', { method: 'GET', headers: getHeaders(false) });
                
                if (response.status === 401) {
                    logout();
                    return;
                }

                var result = await response.json();
                var tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                if (result.status === 'success' && result.data && result.data.length > 0) {
                    for (var i = 0; i < result.data.length; i++) {
                        var dept = result.data[i];
                        var tr = document.createElement('tr');

                        tr.innerHTML =
                            '<td>#' + dept.department_id + '</td>' +
                            '<td class="fw-medium">' + dept.name + '</td>' +
                            '<td>' + dept.faculty_id + '</td>' +
                            '<td class="text-end">' +
                            '<button class="btn btn-sm btn-outline-secondary" ' +
                            'onclick="openModal(\'' + dept.department_id + '\', \'' + dept.name + '\', \'' + dept.faculty_id + '\')">Edit</button>' +
                            '</td>';

                        tbody.appendChild(tr);
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">No departments found.</td></tr>';
                }
            } catch (error) {
                console.error('Department fetch error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="text-center text-danger py-4">Failed to load data. Check console.</td></tr>';
            }
        }

        // Open modal and pre-fill data if editing
        function openModal(id, name, facultyId) {
            document.getElementById('department_id').value = id;
            document.getElementById('name').value = name;
            document.getElementById('faculty_id').value = facultyId;
            document.getElementById('modalTitle').innerText = id ? 'Edit Department' : 'Add Department';
            bootstrapModal.show();
        }

        // Handle form submission
        document.getElementById('dataForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            var id = document.getElementById('department_id').value;
            var name = document.getElementById('name').value;
            var facultyId = document.getElementById('faculty_id').value;

            var endpoint = '';
            var method = '';
            var headers = {};
            var bodyData = null;

            if (id) {
                endpoint = 'EditDepartment.php';
                method = 'PUT';
                headers = getHeaders(true);
                bodyData = JSON.stringify({
                    department_id: parseInt(id),
                    name: name,
                    faculty_id: parseInt(facultyId)
                });
            } else {
                endpoint = 'AddDepartment.php';
                method = 'POST';
                headers = getHeaders(false);
                bodyData = new FormData();
                bodyData.append('name', name);
                bodyData.append('faculty_id', facultyId);
            }

            try {
                var response = await fetch(baseUrl + endpoint, {
                    method: method,
                    headers: headers,
                    body: bodyData
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                var result = await response.json();

                if (result.status === 'success') {
                    bootstrapModal.hide();
                    showAlert(result.message, 'success');
                    loadDepartments();
                } else {
                    showAlert(result.message || 'Operation failed.', 'danger');
                }
            } catch (error) {
                console.error('Submit error:', error);
                showAlert('Network error occurred. Check console for details.', 'danger');
            }
        });

        window.onload = function () {
            loadFaculties();
            loadDepartments();
        };
    </script>
</body>

</html>
