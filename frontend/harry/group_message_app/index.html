<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GroupW Messenger Premium</title>
    <link href="./bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
      :root {
        --primary: #4f46e5;
        --primary-hover: #4338ca;
        --bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
        --glass-bg: rgba(255, 255, 255, 0.75);
        --glass-border: rgba(255, 255, 255, 0.5);
        --text-main: #0f172a;
        --text-muted: #64748b;
        --bubble-them: #ffffff;
      }

      body {
        background: var(--bg-gradient);
        font-family: "Inter", sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        overflow: hidden;
      }

      body::before, body::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        z-index: -1;
        filter: blur(80px);
        opacity: 0.4;
      }
      body::before { background: #818cf8; top: -100px; left: -100px; }
      body::after { background: #c084fc; bottom: -100px; right: -100px; }

      .card {
        border: 1px solid var(--glass-border);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 440px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .d-none { display: none !important; }

      /* Auth View */
      #auth-view { padding: 3rem 2.5rem; }
      #auth-title { font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem; font-size: 1.75rem; }

      .form-control {
        border-radius: 14px;
        padding: 14px 18px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.9);
        font-size: 0.95rem;
        transition: all 0.3s;
      }

      .form-control:focus {
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        border-color: var(--primary);
        background: #ffffff;
      }

      .btn-primary {
        background-color: var(--primary);
        border: none;
        border-radius: 14px;
        padding: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
      }
      .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

      /* Chat View */
      #chat-view {
        max-width: 700px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        padding: 0;
        overflow: hidden;
      }

      .chat-header {
        padding: 20px 30px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.4);
      }

      .chat-header h5 { margin: 0; font-weight: 600; font-size: 1.2rem; letter-spacing: -0.5px; }

      .btn-logout {
        color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        border: none;
        border-radius: 10px;
        padding: 8px 16px;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.2s;
      }
      .btn-logout:hover { background: #ef4444; color: white; }

      /* Message Area */
      #message-container {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      #message-container::-webkit-scrollbar { width: 6px; }
      #message-container::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 10px; }

      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .slide-in { animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
      .msg-wrapper.them { align-self: flex-start; }
      .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }

      .msg-metadata { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 6px; padding: 0 6px; font-weight: 500; }

      .msg-bubble {
        padding: 14px 18px;
        font-size: 0.95rem;
        line-height: 1.5;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.4);
        word-wrap: break-word;
        overflow-wrap: break-word;
      }
      .them .msg-bubble { background: var(--bubble-them); color: var(--text-main); border-radius: 20px 20px 20px 4px; }
      .me .msg-bubble { background: var(--primary); color: white; border-radius: 20px 20px 4px 20px; border: none; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25); }
      
      .temp-msg .msg-bubble { opacity: 0.7; }

      /* Edit Button UI */
      .msg-actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
        font-size: 0.75rem;
        opacity: 0;
        transition: opacity 0.2s;
        justify-content: flex-end;
      }
      .me:hover .msg-actions { opacity: 1; }

      .edit-btn {
        background: transparent !important;
        border: none !important;
        color: var(--primary) !important;
        cursor: pointer;
        padding: 0 5px;
        font-weight: 600;
        font-size: 0.8rem;
        outline: none !important;
        box-shadow: none !important;
      }
      .edit-btn:hover { text-decoration: underline; color: var(--primary-hover) !important; }

      /* Input Area */
      .chat-footer { padding: 20px 30px; background: transparent; padding-bottom: 30px; }
      #chat-form {
        display: flex;
        gap: 12px;
        background: white;
        padding: 8px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      #message-input { border: none; background: transparent; padding: 10px 16px; font-size: 0.95rem; }
      #message-input:focus { box-shadow: none; background: transparent; }
      #send-btn { border-radius: 14px; padding: 10px 24px; font-weight: 600; }

      /* --- Custom Edit Modal --- */
      #custom-edit-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(5px);
        -webkit-backdrop-filter: blur(5px);
      }
      .modal-box {
        position: relative;
        z-index: 1001;
        padding: 25px;
        width: 90%;
        max-width: 420px;
        animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
    </style>
  </head>
  <body>
    <div id="auth-view" class="card">
      <h3 id="auth-title" class="text-center">Welcome Back</h3>
      <p class="text-center text-muted mb-4">Sign in to GroupW to continue</p>
      <form id="auth-form">
        <div class="mb-3"><input type="text" id="username" class="form-control" placeholder="Username" required autocomplete="off" /></div>
        <div class="mb-4"><input type="password" id="password" class="form-control" placeholder="Password" required /></div>
        <div id="auth-error" class="alert alert-danger d-none p-2 text-center" style="font-size: 0.85rem; border-radius: 10px"></div>
        <button type="submit" id="auth-btn" class="btn btn-primary w-100 d-flex justify-content-center align-items-center gap-2">
          <span id="auth-btn-text">Login</span>
          <span id="auth-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
        </button>
      </form>
      <p class="text-center mt-4 mb-0">
        <a href="#" id="toggle-auth" class="text-decoration-none" style="color: var(--primary); font-weight: 500; font-size: 0.9rem">Create an account</a>
      </p>
    </div>

    <div id="chat-view" class="card d-none">
      <div class="chat-header">
        <div>
          <h5>GroupW Global</h5>
          <small class="text-muted" style="font-size: 0.8rem; font-weight: 500">Public room</small>
        </div>
        <button id="logout-btn" class="btn-logout d-flex align-items-center gap-2">
          <span>Logout</span>
          <span id="logout-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
        </button>
      </div>

      <div id="message-container">
        <div id="fetch-loader" class="d-none w-100 h-100 d-flex justify-content-center align-items-center text-primary">
          <div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div>
        </div>
      </div>

      <div class="chat-footer">
        <form id="chat-form">
          <input type="text" id="message-input" class="form-control flex-grow-1" placeholder="Type your message..." required autocomplete="off" />
          <button type="submit" id="send-btn" class="btn btn-primary d-flex align-items-center gap-2">
            <span id="send-btn-text">Send</span>
            <span id="send-spinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
          </button>
        </form>
      </div>
    </div>

    <div id="custom-edit-modal" class="d-none">
      <div class="modal-overlay" id="close-modal-overlay"></div>
      <div class="modal-box card">
        <h5 style="margin-bottom: 15px; font-weight: 600; color: var(--text-main);">Edit Message</h5>
        <input type="hidden" id="edit-msg-id" />
        <textarea id="edit-msg-input" class="form-control" rows="3" style="resize: none; margin-bottom: 15px; color: #000; background: #fff; border: 1px solid #ddd;"></textarea>
        <div style="display: flex; justify-content: flex-end; gap: 10px;">
          <button class="btn" id="close-modal-btn" style="background: #e2e8f0; color: #475569; font-weight: 500; border-radius: 12px; padding: 10px 20px;">Cancel</button>
          <button class="btn btn-primary" id="save-modal-btn" style="border-radius: 12px; padding: 10px 20px;">Save Changes</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
