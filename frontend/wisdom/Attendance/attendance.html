<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Attendance</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #fafafa;
        color: #062a39;
      }
      .card {
        border: none;
        box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1);
      }
      .card-header-custom {
        background-color: #062a39;
        color: #fafafa;
        border-radius: 8px 8px 0 0 !important;
      }
      .btn-custom {
        background-color: #00b4d5;
        color: #fafafa;
        border: none;
        font-weight: 600;
      }
      .btn-custom:hover {
        background-color: #062a39;
        color: #fafafa;
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-dark mb-5"
      style="background-color: #062a39"
    >
      <div class="container">
        <a
          class="navbar-brand text-uppercase fw-bold"
          href="#"
          style="color: #00b4d5"
          >Attendance System</a
        >
      </div>
    </nav>

    <div class="container mb-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card">
            <div class="card-header card-header-custom p-4 text-center">
              <h4 class="mb-0">Mark Present</h4>
              <small style="color: #00b4d5"
                >Secure GPS & OTP Verification</small
              >
            </div>
            <div class="card-body p-4">
              <div id="alertBox" class="alert d-none" role="alert"></div>

              <!-- Step 1: Request OTP -->
              <div id="requestSection">
                <div class="mb-3">
                  <label for="session_id" class="form-label fw-bold"
                    >Session ID</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="session_id"
                    placeholder="From Admin Board"
                    required
                  />
                </div>
                <div class="mb-4">
                  <label for="matric_no" class="form-label fw-bold"
                    >Matriculation Number</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="matric_no"
                    placeholder="e.g. 19/CSC/001"
                    required
                  />
                </div>
                <button
                  type="button"
                  class="btn btn-custom w-100 py-2"
                  id="requestOtpBtn"
                >
                  <span
                    class="spinner-border spinner-border-sm d-none"
                    id="reqSpinner"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  <span id="reqText">Request Verification Code</span>
                </button>
              </div>

              <!-- Step 2: Verify OTP & GPS (Hidden initially) -->
              <div id="verifySection" class="d-none">
                <div class="mb-4">
                  <label for="otp_code" class="form-label fw-bold"
                    >Enter 6-Digit OTP</label
                  >
                  <input
                    type="text"
                    class="form-control text-center fs-4 letter-spacing-2"
                    id="otp_code"
                    placeholder="------"
                    maxlength="6"
                    required
                  />
                  <div
                    class="form-text mt-2 text-success"
                    id="emailHintText"
                  ></div>
                </div>
                <button
                  type="button"
                  class="btn btn-success w-100 py-2 fw-bold"
                  id="verifyOtpBtn"
                >
                  <span
                    class="spinner-border spinner-border-sm d-none"
                    id="verSpinner"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  <span id="verText">Verify Location & Mark Present</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const baseUrl = "http://localhost:8000/api/";
      let lockedSession = "";
      let lockedMatric = "";

      // Step 1: Request OTP
      document
        .getElementById("requestOtpBtn")
        .addEventListener("click", async function () {
          const sessionId = document.getElementById("session_id").value.trim();
          const matricNo = document.getElementById("matric_no").value.trim();
          const alertBox = document.getElementById("alertBox");
          const reqBtn = document.getElementById("requestOtpBtn");
          const reqSpinner = document.getElementById("reqSpinner");
          const reqText = document.getElementById("reqText");

          if (!sessionId || !matricNo) {
            alertBox.className = "alert alert-danger";
            alertBox.textContent =
              "Session ID and Matriculation Number are required.";
            return;
          }

          reqBtn.disabled = true;
          reqSpinner.className = "spinner-border spinner-border-sm";
          reqText.textContent = "Generating Code...";
          alertBox.className = "alert alert-info";
          alertBox.textContent = "Requesting OTP from server...";

          lockedSession = sessionId;
          lockedMatric = matricNo;

          const formData = new FormData();
          formData.append("matric_no", matricNo);

          try {
            const response = await fetch(baseUrl + "SendAttendanceOTP.php", {
              method: "POST",
              body: formData,
            });

            const result = await response.json();

            reqBtn.disabled = false;
            reqSpinner.className = "spinner-border spinner-border-sm d-none";
            reqText.textContent = "Request Verification Code";

            if (result.status === "success") {
              alertBox.className = "alert alert-success";
              alertBox.textContent = result.message;
              document.getElementById("emailHintText").textContent =
                `Code sent to: ${result.email_hint}`;

              // Swap sections using Bootstrap utilities
              document.getElementById("requestSection").classList.add("d-none");
              document
                .getElementById("verifySection")
                .classList.remove("d-none");
            } else {
              alertBox.className = "alert alert-danger";
              alertBox.textContent = result.message;
            }
          } catch (error) {
            reqBtn.disabled = false;
            reqSpinner.className = "spinner-border spinner-border-sm d-none";
            reqText.textContent = "Request Verification Code";
            alertBox.className = "alert alert-danger";
            alertBox.textContent =
              "Network error. Make sure the backend is running.";
          }
        });

      // Step 2: Verify Location and Mark Attendance
      document
        .getElementById("verifyOtpBtn")
        .addEventListener("click", function () {
          const otpCode = document.getElementById("otp_code").value.trim();
          const alertBox = document.getElementById("alertBox");
          const verBtn = document.getElementById("verifyOtpBtn");
          const verSpinner = document.getElementById("verSpinner");
          const verText = document.getElementById("verText");

          if (!otpCode || otpCode.length !== 6) {
            alertBox.className = "alert alert-danger";
            alertBox.textContent = "Please enter the valid 6-digit OTP code.";
            return;
          }

          verBtn.disabled = true;
          verSpinner.className = "spinner-border spinner-border-sm";
          verText.textContent = "Checking GPS...";
          alertBox.className = "alert alert-info";
          alertBox.textContent =
            "Verifying physical location and device integrity...";

          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              async function (position) {
                const deviceId = localStorage.getItem("device_id");

                const formData = new FormData();
                formData.append("session_id", lockedSession);
                formData.append("matric_no", lockedMatric);
                formData.append("otp_code", otpCode);
                formData.append("device_id", deviceId);
                formData.append("student_lat", position.coords.latitude);
                formData.append("student_long", position.coords.longitude);

                verText.textContent = "Marking Attendance...";

                try {
                  const response = await fetch(baseUrl + "MarkAttendance.php", {
                    method: "POST",
                    body: formData,
                  });

                  const result = await response.json();

                  verBtn.disabled = false;
                  verSpinner.className =
                    "spinner-border spinner-border-sm d-none";
                  verText.textContent = "Verify Location & Mark Present";

                  if (result.status === "success") {
                    alertBox.className =
                      "alert alert-success fw-bold text-center fs-5";
                    alertBox.textContent = result.message;
                    // Lock down UI after success
                    document
                      .getElementById("verifySection")
                      .classList.add("d-none");
                  } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.textContent = result.message;
                  }
                } catch (error) {
                  verBtn.disabled = false;
                  verSpinner.className =
                    "spinner-border spinner-border-sm d-none";
                  verText.textContent = "Verify Location & Mark Present";
                  alertBox.className = "alert alert-danger";
                  alertBox.textContent =
                    "Network error processing your attendance.";
                }
              },
              function (error) {
                verBtn.disabled = false;
                verSpinner.className =
                  "spinner-border spinner-border-sm d-none";
                verText.textContent = "Verify Location & Mark Present";
                alertBox.className = "alert alert-danger";
                alertBox.textContent =
                  "Location access denied. You must enable GPS to mark attendance.";
              },
            );
          } else {
            verBtn.disabled = false;
            verSpinner.className = "spinner-border spinner-border-sm d-none";
            verText.textContent = "Verify Location & Mark Present";
            alertBox.className = "alert alert-danger";
            alertBox.textContent =
              "Geolocation is not supported by your browser.";
          }
        });
    </script>
  </body>
</html>
