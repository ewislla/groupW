<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #fafafa;
        color: #062a39;
      }
      .navbar-custom {
        background-color: #062a39;
      }
      .navbar-custom .navbar-brand {
        color: #00b4d5;
        font-weight: 700;
        text-transform: uppercase;
      }
      .card {
        border: none;
        box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1);
        margin-bottom: 20px;
        border-radius: 8px;
      }
      .card-header-custom {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
        border-radius: 8px 8px 0 0 !important;
      }
      .btn-custom {
        background-color: #00b4d5;
        color: #fafafa;
        border: none;
        font-weight: 600;
      }
      .btn-custom:hover {
        background-color: #062a39;
        color: #fafafa;
      }
      .table thead th {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
      }
      .table-hover tbody tr:hover {
        background-color: #f1f8fa;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav me-auto mb-2 mb-lg-0">
            <a class="nav-link" href="faculty.html">Faculties</a>
            <a class="nav-link" href="department.html">Departments</a>
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
          </div>
          <div class="navbar-nav ms-auto">
            <button class="btn btn-outline-light btn-sm fw-bold" id="logoutBtn" onclick="logout()">
              <span class="spinner-border spinner-border-sm d-none" id="logoutSpinner" role="status"></span>
              <span id="logoutText">Log Out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div id="dashboardAlert" class="alert d-none" role="alert"></div>

      <div class="row">
        <!-- LEFT COLUMN: Start Class -->
        <div class="col-lg-4 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header card-header-custom p-3 text-center">
              <h5 class="mb-0">Start Class Session</h5>
            </div>
            <div class="card-body p-4">
              <form id="adminForm">
                <div class="mb-4">
                  <label for="course_code" class="form-label fw-bold">Course Code</label>
                  <input type="text" class="form-control" id="course_code" name="course_code" placeholder="e.g. CSC301" required />
                </div>
                <!-- Hidden inputs for Admin GPS -->
                <input type="hidden" id="latitude" name="latitude" />
                <input type="hidden" id="longitude" name="longitude" />

                <button type="submit" class="btn btn-custom w-100 py-2" id="startClassBtn">
                  <span class="spinner-border spinner-border-sm d-none" id="classSpinner" role="status"></span>
                  <span id="classBtnText">Lock GPS & Start Class</span>
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN: System Users -->
        <div class="col-lg-8 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header card-header-custom p-3 d-flex justify-content-between align-items-center">
              <h5 class="mb-0">System Users</h5>
              <button type="button" class="btn btn-custom btn-sm px-3" data-bs-toggle="modal" data-bs-target="#addUserModal">
                + Add New User
              </button>
            </div>
            <div class="card-body p-0 table-responsive">
              <table class="table table-striped table-hover mb-0 align-middle">
                <thead>
                  <tr>
                    <th class="ps-3">Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="userTableBody">
                  <!-- Populated by JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ADD USER MODAL -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header card-header-custom">
            <h5 class="modal-title">Add New User</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <form id="addUserForm">
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark">First Name</label>
                  <input type="text" class="form-control" name="first_name" required />
                </div>
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark">Last Name</label>
                  <input type="text" class="form-control" name="last_name" required />
                </div>
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark">Middle Name</label>
                <input type="text" class="form-control" name="middle_name" />
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark">Email</label>
                <input type="email" class="form-control" name="email" required />
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark">Password</label>
                <input type="password" class="form-control" name="password" required />
              </div>
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark">Role</label>
                  <select class="form-select" name="role" required>
                    <option value="Admin">Admin</option>
                    <option value="Moderator">Moderator</option>
                  </select>
                </div>
                <div class="col-md-6 mb-4">
                  <label class="form-label fw-medium text-dark">Status</label>
                  <select class="form-select" name="active" required>
                    <option value="True">Active</option>
                    <option value="false">Inactive</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn btn-custom w-100 py-2" id="addBtn">
                <span class="spinner-border spinner-border-sm d-none" id="addSpinner" role="status"></span>
                <span id="addBtnText">Create User</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const baseUrl = "http://localhost:8000/api/";

      // 1. LOGOUT LOGIC
      async function logout() {
        const token = localStorage.getItem("user_token");
        const btn = document.getElementById("logoutBtn");
        const spinner = document.getElementById("logoutSpinner");
        const text = document.getElementById("logoutText");

        if (token) {
          btn.disabled = true;
          spinner.className = "spinner-border spinner-border-sm";
          text.textContent = " Logging out...";
          const formData = new FormData();
          formData.append("token", token);
          try {
            await fetch(baseUrl + "LogoutUser.php", { method: "POST", body: formData });
          } catch (error) {
            console.error("Logout API failed, forcing local wipe.");
          }
        }
        localStorage.removeItem("user_token");
        window.location.href = "login.html";
      }

      // 2. FETCH USERS LOGIC
      async function fetchUsers() {
        try {
          const response = await fetch(baseUrl + "GetUser.php");
          const result = await response.json();
          const tbody = document.getElementById("userTableBody");
          tbody.innerHTML = "";

          if (result.status === "success" && result.data) {
            for (let i = 0; i < result.data.length; i++) {
              const user = result.data[i];
              const tr = document.createElement("tr");
              tr.innerHTML = `
                      <td class="ps-3 fw-medium">${user.first_name} ${user.last_name}</td>
                      <td>${user.email}</td>
                      <td><span class="badge bg-secondary">${user.role}</span></td>
                      <td>${user.active === "True" ? '<span class="text-success fw-bold">Active</span>' : '<span class="text-danger">Inactive</span>'}</td>
                  `;
              tbody.appendChild(tr);
            }
          }
        } catch (error) {
          console.error("Error fetching users:", error);
        }
      }

      // 3. START CLASS LOGIC
      document.getElementById("adminForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const btn = document.getElementById("startClassBtn");
        const spinner = document.getElementById("classSpinner");
        const text = document.getElementById("classBtnText");
        const alertBox = document.getElementById("dashboardAlert");

        btn.disabled = true;
        spinner.className = "spinner-border spinner-border-sm";
        text.textContent = " Fetching GPS...";
        
        alertBox.className = "alert alert-info";
        alertBox.textContent = "Acquiring your location coordinates...";
        alertBox.classList.remove("d-none");

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            async function (position) {
              document.getElementById("latitude").value = position.coords.latitude;
              document.getElementById("longitude").value = position.coords.longitude;

              const form = document.getElementById("adminForm");
              const formData = new FormData(form);
              text.textContent = " Starting Class...";

              try {
                const response = await fetch(baseUrl + "StartSession.php", { method: "POST", body: formData });
                const result = await response.json();

                btn.disabled = false;
                spinner.className = "spinner-border spinner-border-sm d-none";
                text.textContent = "Lock GPS & Start Class";

                if (result.status === "success") {
                  alertBox.className = "alert alert-success fs-5 text-center";
                  alertBox.innerHTML = `Class Started!<br><strong>Session ID: ${result.session_id}</strong>`;
                  form.reset();
                } else {
                  alertBox.className = "alert alert-danger";
                  alertBox.textContent = result.message;
                }
              } catch (error) {
                btn.disabled = false;
                spinner.className = "spinner-border spinner-border-sm d-none";
                text.textContent = "Lock GPS & Start Class";
                alertBox.className = "alert alert-danger";
                alertBox.textContent = "Network error connecting to the backend.";
              }
            },
            function (error) {
              btn.disabled = false;
              spinner.className = "spinner-border spinner-border-sm d-none";
              text.textContent = "Lock GPS & Start Class";
              alertBox.className = "alert alert-danger";
              alertBox.textContent = "GPS Error: You must allow location services.";
            }
          );
        } else {
          btn.disabled = false;
          spinner.className = "spinner-border spinner-border-sm d-none";
          text.textContent = "Lock GPS & Start Class";
          alertBox.className = "alert alert-danger";
          alertBox.textContent = "Geolocation is not supported by your browser.";
        }
      });

      // 4. ADD USER LOGIC
      document.getElementById("addUserForm").addEventListener("submit", async function (e) {
        e.preventDefault();

        const form = e.target;
        const formData = new FormData(form);
        const btn = document.getElementById("addBtn");
        const spinner = document.getElementById("addSpinner");
        const text = document.getElementById("addBtnText");
        const alertBox = document.getElementById("dashboardAlert");

        btn.disabled = true;
        spinner.className = "spinner-border spinner-border-sm";
        text.textContent = " Saving...";

        try {
          const response = await fetch(baseUrl + "AddUser.php", { method: "POST", body: formData });
          const result = await response.json();

          btn.disabled = false;
          spinner.className = "spinner-border spinner-border-sm d-none";
          text.textContent = "Create User";

          const modalElement = document.getElementById("addUserModal");
          const modalInstance = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
          modalInstance.hide();

          if (result.status === "success" || result.status === 201) {
            alertBox.className = "alert alert-success mt-3";
            alertBox.textContent = result.message || "User added successfully";
            alertBox.classList.remove("d-none");
            form.reset();
            fetchUsers();
          } else {
            alertBox.className = "alert alert-danger mt-3";
            alertBox.textContent = result.message;
            alertBox.classList.remove("d-none");
          }
          
          setTimeout(() => { alertBox.classList.add("d-none"); }, 5000);
          
        } catch (error) {
          btn.disabled = false;
          spinner.className = "spinner-border spinner-border-sm d-none";
          text.textContent = "Create User";
          
          const modalElement = document.getElementById("addUserModal");
          const modalInstance = bootstrap.Modal.getInstance(modalElement);
          if (modalInstance) modalInstance.hide();
          
          alertBox.className = "alert alert-danger mt-3";
          alertBox.textContent = "Network error. Please try again.";
          alertBox.classList.remove("d-none");
        }
      });

      window.onload = function () {
        if (!localStorage.getItem("user_token")) {
          window.location.href = "login.html";
        } else {
          fetchUsers();
        }
      };
    </script>
  </body>
</html>
