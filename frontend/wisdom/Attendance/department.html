<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Departments</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #fafafa;
        color: #062a39;
      }
      .navbar-custom {
        background-color: #062a39;
      }
      .navbar-custom .navbar-brand {
        color: #00b4d5;
        font-weight: 700;
        text-transform: uppercase;
      }
      .navbar-custom .nav-link.active {
        color: #00b4d5;
        font-weight: 600;
      }
      .card {
        border: none;
        box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1);
      }
      .card-header-custom {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
      }
      .btn-custom {
        background-color: #00b4d5;
        color: #fafafa;
        border: none;
        font-weight: 600;
      }
      .btn-custom:hover {
        background-color: #062a39;
        color: #fafafa;
      }
      .table thead th {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
      }
      .modal-header-custom {
        background-color: #062a39;
        color: #fafafa;
      }
      .modal-header-custom .btn-close {
        filter: invert(1);
      }
      .text-accent {
        color: #00b4d5;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav me-auto mb-2 mb-lg-0">
            <a class="nav-link" href="faculty.html">Faculties</a>
            <a class="nav-link" href="department.html">Departments</a>
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
          </div>
          <div class="navbar-nav ms-auto">
            <button
              class="btn btn-outline-light btn-sm fw-bold"
              id="logoutBtn"
              onclick="logout()"
            >
              <span
                class="spinner-border spinner-border-sm d-none"
                id="logoutSpinner"
                role="status"
              ></span>
              <span id="logoutText">Log Out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-5">
          <div class="card shadow-sm mb-4">
            <div class="card-header card-header-custom p-3">
              <h5 class="mb-0">Add New Department</h5>
            </div>
            <div class="card-body">
              <div id="alertBox" class="alert d-none" role="alert"></div>
              <form id="departmentForm">
                <div class="mb-3">
                  <label for="name" class="form-label fw-medium"
                    >Department Name</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="name"
                    name="name"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="facultySelect" class="form-label fw-medium"
                    >Select Faculty</label
                  >
                  <select
                    class="form-select"
                    id="facultySelect"
                    name="faculty_id"
                    required
                  ></select>
                </div>
                <button
                  type="submit"
                  class="btn btn-custom w-100 py-2"
                  id="submitBtn"
                >
                  <span
                    class="spinner-border spinner-border-sm d-none"
                    id="btnSpinner"
                    role="status"
                    aria-hidden="true"
                  ></span>
                  <span id="btnText">Add Department</span>
                </button>
              </form>
            </div>
          </div>
        </div>

        <div class="col-md-7">
          <div class="card shadow-sm">
            <div class="card-header card-header-custom p-3">
              <h5 class="mb-0">Existing Departments</h5>
            </div>
            <div class="card-body p-0">
              <table class="table table-striped table-hover mb-0">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Department Name</th>
                    <th>Faculty ID</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody id="departmentTableBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="editModal"
      tabindex="-1"
      aria-labelledby="editModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header modal-header-custom">
            <h5 class="modal-title" id="editModalLabel">Edit Department</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editDepartmentForm">
              <input type="hidden" id="edit_department_id" />
              <div class="mb-3">
                <label for="edit_name" class="form-label fw-medium"
                  >Department Name</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="edit_name"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="edit_faculty_id" class="form-label fw-medium"
                  >Select Faculty</label
                >
                <select
                  class="form-select"
                  id="edit_faculty_id"
                  required
                ></select>
              </div>
              <button
                type="submit"
                class="btn btn-custom w-100 py-2"
                id="editSubmitBtn"
              >
                <span
                  class="spinner-border spinner-border-sm d-none"
                  id="editBtnSpinner"
                  role="status"
                  aria-hidden="true"
                ></span>
                <span id="editBtnText">Save Changes</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="../bootstrap/js/bootstrap.bundle.js"></script>
    <script>
      const baseUrl = "http://localhost:8000/api/";

      async function fetchFacultiesForDropdown() {
        const response = await fetch(baseUrl + "GetFaculty.php");
        const result = await response.json();
        const select = document.getElementById("facultySelect");
        select.innerHTML = '<option value="">-- Choose a Faculty --</option>';

        if (result.status === "success") {
          result.data.forEach((faculty) => {
            const option = document.createElement("option");
            option.value = faculty.faculty_id;
            option.textContent = faculty.name;
            select.appendChild(option);
          });
        }
      }

      async function fetchDepartments() {
        const response = await fetch(baseUrl + "GetDepartment.php");
        const result = await response.json();
        const tbody = document.getElementById("departmentTableBody");
        tbody.innerHTML = "";

        if (result.status === "success") {
          result.data.forEach((dept) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                    <td>${dept.department_id}</td>
                    <td>${dept.name}</td>
                    <td>${dept.faculty_id}</td>
                    <td>
                        <button class="btn btn-sm btn-custom" onclick="openEditModal(${dept.department_id}, '${dept.name}', ${dept.faculty_id})">Edit</button>
                    </td>
                `;
            tbody.appendChild(tr);
          });
        }
      }

      document
        .getElementById("departmentForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const form = e.target;
          const formData = new FormData(form);
          const submitBtn = document.getElementById("submitBtn");
          const btnSpinner = document.getElementById("btnSpinner");
          const btnText = document.getElementById("btnText");
          const alertBox = document.getElementById("alertBox");

          submitBtn.disabled = true;
          btnSpinner.classList.remove("d-none");
          btnText.textContent = "Saving...";
          alertBox.className = "alert d-none";

          const response = await fetch(baseUrl + "AddDepartment.php", {
            method: "POST",
            body: formData,
          });
          const result = await response.json();

          submitBtn.disabled = false;
          btnSpinner.classList.add("d-none");
          btnText.textContent = "Add Department";

          alertBox.className = "alert";
          if (result.status === "success" || result.status === 201) {
            alertBox.classList.add("alert-success");
            alertBox.textContent =
              result.message || "Department added successfully";
            form.reset();
            fetchDepartments();
          } else {
            alertBox.classList.add("alert-danger");
            alertBox.textContent = result.message;
          }
        });

      function openEditModal(id, name, facultyId) {
        document.getElementById("edit_department_id").value = id;
        document.getElementById("edit_name").value = name;

        const facultySelectOptions =
          document.getElementById("facultySelect").innerHTML;
        const editFacultySelect = document.getElementById("edit_faculty_id");
        editFacultySelect.innerHTML = facultySelectOptions;
        editFacultySelect.value = facultyId;

        const editModal = new bootstrap.Modal(
          document.getElementById("editModal"),
        );
        editModal.show();
      }

      document
        .getElementById("editDepartmentForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const id = document.getElementById("edit_department_id").value;
          const name = document.getElementById("edit_name").value;
          const facultyId = document.getElementById("edit_faculty_id").value;
          const submitBtn = document.getElementById("editSubmitBtn");
          const btnSpinner = document.getElementById("editBtnSpinner");
          const btnText = document.getElementById("editBtnText");

          submitBtn.disabled = true;
          btnSpinner.classList.remove("d-none");
          btnText.textContent = "Saving...";

          await editDepartment(id, name, facultyId);

          submitBtn.disabled = false;
          btnSpinner.classList.add("d-none");
          btnText.textContent = "Save Changes";

          const modalElement = document.getElementById("editModal");
          const editModal = bootstrap.Modal.getInstance(modalElement);
          editModal.hide();
        });

      async function editDepartment(departmentId, newName, facultyId) {
        const payload = {
          department_id: departmentId,
          name: newName,
          faculty_id: facultyId,
        };

        const response = await fetch(baseUrl + "EditDepartment.php", {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const result = await response.json();

        if (result.status === "success") {
          fetchDepartments();
        } else {
          alert(result.message);
        }
      }

      window.onload = () => {
        fetchFacultiesForDropdown();
        fetchDepartments();
      };
    </script>
  </body>
</html>
