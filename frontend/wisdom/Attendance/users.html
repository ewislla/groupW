<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users</title>
    <link href="../bootstrap/bootstrap.min.css" rel="stylesheet" />
    <style>
      body {
        background-color: #fafafa;
        color: #062a39;
      }
      .navbar-custom {
        background-color: #062a39;
      }
      .navbar-custom .navbar-brand {
        color: #00b4d5;
        font-weight: 700;
        text-transform: uppercase;
      }
      .card {
        border: none;
        box-shadow: 0 4px 12px rgba(6, 42, 57, 0.1);
        margin-bottom: 20px;
        border-radius: 8px;
      }
      .card-header-custom {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
        border-radius: 8px 8px 0 0 !important;
      }
      .btn-custom {
        background-color: #00b4d5;
        color: #fafafa;
        border: none;
        font-weight: 600;
      }
      .btn-custom:hover {
        background-color: #062a39;
        color: #fafafa;
      }
      .table thead th {
        background-color: #062a39;
        color: #fafafa;
        border-bottom: none;
      }
      .table-hover tbody tr:hover {
        background-color: #f1f8fa;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">Attendance System</a>

        <!-- Mobile Toggle Button -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Left-aligned main navigation links -->
          <div class="navbar-nav me-auto mb-2 mb-lg-0">
            <a class="nav-link" href="faculty.html">Faculties</a>
            <a class="nav-link" href="department.html">Departments</a>
            <a class="nav-link active" href="users.html">Users</a>
          </div>

          <!-- Right-aligned logout button -->
          <div class="navbar-nav ms-auto">
            <button
              class="btn btn-outline-light btn-sm fw-bold"
              id="logoutBtn"
              onclick="logout()"
            >
              <span
                class="spinner-border spinner-border-sm d-none"
                id="logoutSpinner"
                role="status"
              ></span>
              <span id="logoutText">Log Out</span>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div id="dashboardAlert" class="alert d-none" role="alert"></div>

      <div class="row">
        <!-- System Users Table (Now Full Width) -->
        <div class="col-12">
          <div class="card shadow-sm">
            <div
              class="card-header card-header-custom p-3 d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0">System Users</h5>
              <!-- Trigger Button for the Modal -->
              <button
                type="button"
                class="btn btn-custom btn-sm px-3"
                data-bs-toggle="modal"
                data-bs-target="#addUserModal"
              >
                + Add New User
              </button>
            </div>
            <div class="card-body p-0 table-responsive">
              <table class="table table-striped table-hover mb-0 align-middle">
                <thead>
                  <tr>
                    <th class="ps-3">Name</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="userTableBody">
                  <!-- Populated by JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================================== -->
    <!-- ADD USER MODAL (Hidden by Default)    -->
    <!-- ===================================== -->
    <div
      class="modal fade"
      id="addUserModal"
      tabindex="-1"
      aria-labelledby="addUserModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header card-header-custom">
            <h5 class="modal-title" id="addUserModalLabel">Add New User</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="addUserForm">
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark"
                    >First Name</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="first_name"
                    required
                  />
                </div>
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark"
                    >Last Name</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="last_name"
                    required
                  />
                </div>
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark"
                  >Middle Name</label
                >
                <input type="text" class="form-control" name="middle_name" />
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark">Email</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  required
                />
              </div>
              <div class="mb-2">
                <label class="form-label fw-medium text-dark">Password</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  required
                />
              </div>
              <div class="row">
                <div class="col-md-6 mb-2">
                  <label class="form-label fw-medium text-dark">Role</label>
                  <select class="form-select" name="role" required>
                    <option value="Admin">Admin</option>
                    <option value="Moderator">Moderator</option>
                  </select>
                </div>
                <div class="col-md-6 mb-4">
                  <label class="form-label fw-medium text-dark">Status</label>
                  <select class="form-select" name="active" required>
                    <option value="True">Active</option>
                    <option value="false">Inactive</option>
                  </select>
                </div>
              </div>
              <button
                type="submit"
                class="btn btn-custom w-100 py-2"
                id="addBtn"
              >
                <span
                  class="spinner-border spinner-border-sm d-none"
                  id="addSpinner"
                  role="status"
                ></span>
                <span id="addBtnText">Create User</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Make sure to include the Bootstrap JS bundle for the Modal to open/close -->
    <script src="../bootstrap/js/bootstrap.bundle.js"></script>

    <script>
      const baseUrl = "http://localhost:8000/api/";

      // -----------------------------------------
      // SECURE LOGOUT API IMPLEMENTATION
      // -----------------------------------------
      async function logout() {
        const token = localStorage.getItem("user_token");
        const btn = document.getElementById("logoutBtn");
        const spinner = document.getElementById("logoutSpinner");
        const text = document.getElementById("logoutText");

        // If they have a token, ping the server to destroy the session/device lock
        if (token) {
          btn.disabled = true;
          spinner.className = "spinner-border spinner-border-sm";
          text.textContent = " Logging out...";

          const formData = new FormData();
          formData.append("token", token);

          try {
            await fetch(baseUrl + "LogoutUser.php", {
              method: "POST",
              body: formData,
            });
          } catch (error) {
            console.error("Logout API failed, forcing local wipe.");
          }
        }

        // Always clear the local storage and redirect, even if the API fails
        localStorage.removeItem("user_token");
        window.location.href = "login.html";
      }

      // -----------------------------------------
      // FETCH USERS
      // -----------------------------------------
      async function fetchUsers() {
        const response = await fetch(baseUrl + "GetUser.php");
        const result = await response.json();
        const tbody = document.getElementById("userTableBody");
        tbody.innerHTML = "";

        if (result.status === "success" && result.data) {
          for (let i = 0; i < result.data.length; i++) {
            const user = result.data[i];
            const tr = document.createElement("tr");
            tr.innerHTML = `
                    <td class="ps-3 fw-medium">${user.first_name} ${user.last_name}</td>
                    <td>${user.email}</td>
                    <td><span class="badge bg-secondary">${user.role}</span></td>
                    <td>${user.active === "True" ? '<span class="text-success fw-bold">Active</span>' : '<span class="text-danger">Inactive</span>'}</td>
                `;
            tbody.appendChild(tr);
          }
        }
      }

      // -----------------------------------------
      // ADD USER (MODAL HANDLING)
      // -----------------------------------------
      document
        .getElementById("addUserForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const form = e.target;
          const formData = new FormData(form);
          const btn = document.getElementById("addBtn");
          const spinner = document.getElementById("addSpinner");
          const text = document.getElementById("addBtnText");
          const alertBox = document.getElementById("dashboardAlert");

          btn.disabled = true;
          spinner.className = "spinner-border spinner-border-sm";
          text.textContent = "Saving...";

          const response = await fetch(baseUrl + "AddUser.php", {
            method: "POST",
            body: formData,
          });
          const result = await response.json();

          btn.disabled = false;
          spinner.className = "spinner-border spinner-border-sm d-none";
          text.textContent = "Create User";

          if (result.status === "success" || result.status === 201) {
            // Close the Bootstrap modal automatically on success
            const modalElement = document.getElementById("addUserModal");
            const modalInstance =
              bootstrap.Modal.getInstance(modalElement) ||
              new bootstrap.Modal(modalElement);
            modalInstance.hide();

            alertBox.className = "alert alert-success mt-3";
            alertBox.textContent = result.message || "User added successfully";
            form.reset();
            fetchUsers();
          } else {
            // If it fails, close the modal so they can see the error, or show error inside modal.
            // We will show it outside on the main dashboard alert.
            const modalElement = document.getElementById("addUserModal");
            const modalInstance = bootstrap.Modal.getInstance(modalElement);
            modalInstance.hide();

            alertBox.className = "alert alert-danger mt-3";
            alertBox.textContent = result.message;
          }

          // Auto-hide alert after 5 seconds
          setTimeout(() => {
            alertBox.className = "alert d-none";
          }, 5000);
        });

      window.onload = function () {
        // Quick check to ensure the user is supposed to be here
        if (!localStorage.getItem("user_token")) {
          window.location.href = "login.html";
        } else {
          fetchUsers();
        }
      };
    </script>
  </body>
</html>
